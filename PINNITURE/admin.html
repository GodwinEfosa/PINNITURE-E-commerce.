<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LuxeCraft — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F0F11;--card:#1A1A1E;--text:#E2E2E8;--muted:#888;--gold:#C4973A;--border:#2A2A2E;--accent:#22c55e;--err:#ef4444;--font-body:'DM Sans',sans-serif;--font-head:'Playfair Display',serif;--trans:all .3s cubic-bezier(.25,.46,.45,.94)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,select,textarea{background:var(--card);color:var(--text);border:1px solid var(--border);padding:12px;border-radius:8px;width:100%}

/* LOGIN */
.login{position:fixed;inset:0;background:var(--bg);z-index:999;display:grid;place-items:center;transition:opacity .5s}
.login.hide{opacity:0;pointer-events:none}
.login-box{background:var(--card);padding:40px;border-radius:16px;width:90%;max-width:400px;border:1px solid var(--border);text-align:center}
.login h1{font-family:var(--font-head);margin-bottom:20px}
.login-btn{width:100%;padding:14px;background:var(--gold);border-radius:8px;margin-top:20px;font-weight:600}
.login-err{color:var(--err);margin-top:10px;font-size:14px;min-height:20px}

/* DASHBOARD */
.admin{display:none;min-height:100vh}.admin.show{display:grid;grid-template-columns:240px 1fr}
.side{background:var(--card);border-right:1px solid var(--border);padding:20px}
.side h2{font-family:var(--font-head);margin-bottom:30px;text-align:center}
.s-nav a{display:block;padding:12px 16px;margin-bottom:8px;border-radius:8px;transition:var(--trans)}
.s-nav a:hover,.s-nav a.act{background:rgba(196,151,58,.15);color:var(--gold);border-left:3px solid var(--gold)}
.main{padding:30px;overflow-y:auto;height:100vh}
.h-bar{display:flex;justify-content:space-between;margin-bottom:30px}
.logout{background:var(--card);padding:10px 20px;border-radius:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat{background:var(--card);padding:20px;border-radius:12px}.stat h3{color:var(--gold);font-size:2rem;font-family:var(--font-head)}
.stat p{color:var(--muted);font-size:.9rem}

.card{background:var(--card);border-radius:12px;padding:24px;margin-bottom:20px}
.card h3{margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border);font-size:.9rem}
th{color:var(--muted)}
.badge{padding:4px 8px;border-radius:20px;font-size:.75rem;background:rgba(34,197,94,.15);color:var(--accent)}
.act-btn{background:var(--gold);color:#000;padding:8px 16px;border-radius:6px;font-size:.85rem}
.del-btn{background:rgba(239,68,68,.15);color:var(--err);padding:8px 12px;border-radius:6px;font-size:.85rem}
.form{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form .full{grid-column:1/-1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;place-items:center;padding:20px}
.modal.open{display:grid}
.m-box{background:var(--card);padding:24px;border-radius:12px;width:90%;max-width:500px}
.toast{position:fixed;top:20px;right:20px;background:var(--card);padding:12px 20px;border-radius:10px;z-index:200;transform:translateX(150%);transition:var(--trans)}
.toast.show{transform:translateX(0)}
@media(max-width:900px){.admin.show{grid-template-columns:1fr}.side{display:flex;gap:10px;overflow-x:auto;position:fixed;bottom:0;width:100%;height:60px;border-top:1px solid var(--border);border-right:none;z-index:100;padding:0}.side h2{display:none}.s-nav{display:flex}.s-nav a{margin:0}}
</style>
</head>
<body>

<div class="login" id="loginScreen">
 <div class="login-box">
  <h1>PINNITURE Admin</h1>
  <p style="color:var(--muted);margin-bottom:20px">Secure Management Portal</p>
  <input type="email" id="u" placeholder="admin@luxecraft.com">
  <input type="password" id="p" placeholder="Password">
  <button class="login-btn" onclick="attemptLogin()">Login</button>
  <div class="login-err" id="err"></div>
 </div>
</div>

<div class="admin" id="dash">
 <aside class="side">
  <h2>PINNITURE</h2>
  <nav class="s-nav">
   <a class="act" onclick="tab('dash')">📊 Dashboard</a>
   <a onclick="tab('prods')">🛍️ Products</a>
   <a onclick="tab('vids')">📹 Videos</a>
   <a onclick="tab('orders')">📦 Orders</a>
   <a onclick="tab('set')">⚙️ Settings</a>
  </nav>
 </aside>
 <main class="main" id="content"></main>
</div>

<div class="modal" id="mForm"><div class="m-box" id="mBox"></div></div>
<div class="toast" id="toast"></div>

<script>
const AUTH_KEY='luxecraft_auth';
if(localStorage.getItem(AUTH_KEY)){document.getElementById('loginScreen').classList.add('hide');document.getElementById('dash').classList.add('show');tab('dash')}

function attemptLogin(){
 if(document.getElementById('u').value==='admin@luxecraft.com'&&document.getElementById('p').value==='luxecraft2025'){
  localStorage.setItem(AUTH_KEY,'true');
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('dash').classList.add('show');
  tab('dash');toast('Login successful');
 }else{const e=document.getElementById('err');e.textContent='Invalid credentials';setTimeout(()=>e.textContent='',2000)}
}
function logout(){localStorage.removeItem(AUTH_KEY);location.reload()}

// DATA
let prods=JSON.parse(localStorage.getItem('luxecraft_products'))||[{id:1,name:"Velvet Sofa",price:450000,cat:"living",svg:"sofa",status:"Active"},{id:2,name:"Oak Desk",price:280000,cat:"office",svg:"desk",status:"Active"}];
let vids=JSON.parse(localStorage.getItem('luxecraft_videos'))||[{slot:1,id:'dQw4w9WgXcQ',title:'Living Room'},{slot:2,id:'LXb3EKWsInQ',title:'Office'},{slot:3,id:'9bZkp7q19f0',title:'Kitchen'}];
let orders=JSON.parse(localStorage.getItem('luxecraft_orders'))||[{id:'LC-9281',cust:'John Doe',items:2,total:730000,status:'Processing'},{id:'LC-9282',cust:'Sarah M.',items:1,total:450000,status:'Shipped'}];

function saveP(){localStorage.setItem('luxecraft_products',JSON.stringify(prods))}
function saveV(){localStorage.setItem('luxecraft_videos',JSON.stringify(vids))}
function saveO(){localStorage.setItem('luxecraft_orders',JSON.stringify(orders))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

function tab(t){
 document.querySelectorAll('.s-nav a').forEach(a=>a.classList.remove('act'));event.target.classList.add('act');
 const c=document.getElementById('content');
 if(t==='dash')c.innerHTML=`<div class="h-bar"><h2>Dashboard</h2><button class="logout" onclick="logout()">Logout</button></div><div class="stats"><div class="stat"><h3>${prods.length}</h3><p>Products</p></div><div class="stat"><h3>${orders.length}</h3><p>Orders</p></div><div class="stat"><h3>₦${orders.reduce((a,o)=>a+o.total,0).toLocaleString()}</h3><p>Revenue</p></div><div class="stat"><h3>3</h3><p>Active Videos</p></div></div><div class="card"><h3>Recent Activity</h3><p style="color:var(--muted)">System synced. All modules operational.</p></div>`;
 else if(t==='prods')renderProds(c);
 else if(t==='vids')renderVids(c);
 else if(t==='orders')renderOrders(c);
 else if(t==='set')c.innerHTML=`<div class="h-bar"><h2>Settings</h2><button class="logout" onclick="logout()">Logout</button></div><div class="card"><h3>Store Configuration</h3><div class="form"><input value="LuxeCraft" placeholder="Store Name"><input value="Premium Furniture & Interiors" placeholder="Tagline"><input type="email" placeholder="Support Email" class="full"><button class="act-btn full" onclick="toast('Saved')">Save Settings</button></div></div>`;
}

function renderProds(c){
 c.innerHTML=`<div class="h-bar"><h2>Manage Products</h2><button class="act-btn" onclick="addProd()">+ Add Product</button></div><div class="card"><table><thead><tr><th>Name</th><th>Price</th><th>Status</th><th>Action</th></tr></thead><tbody>${prods.map(p=>`<tr><td>${p.name}</td><td>₦${p.price.toLocaleString()}</td><td><span class="badge">${p.status}</span></td><td><button class="act-btn" onclick="editProd(${p.id})">Edit</button><button class="del-btn" onclick="delProd(${p.id})">Delete</button></td></tr>`).join('')}</tbody></table></div>`;
}
function addProd(e){document.getElementById('mForm').classList.add('open');document.getElementById('mBox').innerHTML=`<h3>Add Product</h3><div class="form"><input id="nName" placeholder="Name"><input id="nPrice" placeholder="Price" type="number"><select id="nCat"><option>living</option><option>bedroom</option><option>office</option><option>kitchen</option></select><select id="nStat"><option>Active</option><option>Sold Out</option></select><button class="act-btn full" onclick="saveProd()">Save</button></div>`}
function editProd(id){const p=prods.find(x=>x.id===id);document.getElementById('mForm').classList.add('open');document.getElementById('mBox').innerHTML=`<h3>Edit</h3><div class="form"><input id="eId" value="${p.id}" hidden><input id="eName" value="${p.name}"><input id="ePrice" value="${p.price}" type="number"><select id="eCat"><option ${p.cat==='living'?'selected':''}>living</option><option ${p.cat==='bedroom'?'selected':''}>bedroom</option><option ${p.cat==='office'?'selected':''}>office</option></select><select id="eStat"><option ${p.status==='Active'?'selected':''}>Active</option><option>Sold Out</option></select><button class="act-btn full" onclick="updateProd()">Update</button></div>`}
function saveProd(){prods.push({id:Date.now(),name:document.getElementById('nName').value,price:+document.getElementById('nPrice').value,cat:document.getElementById('nCat').value,svg:'sofa',status:document.getElementById('nStat').value});saveP();document.getElementById('mForm').classList.remove('open');tab('prods');toast('Saved')}
function updateProd(){const id=+document.getElementById('eId').value;const p=prods.find(x=>x.id===id);p.name=document.getElementById('eName').value;p.price=+document.getElementById('ePrice').value;p.cat=document.getElementById('eCat').value;p.status=document.getElementById('eStat').value;saveP();document.getElementById('mForm').classList.remove('open');tab('prods');toast('Updated')}
function delProd(id){if(confirm('Delete?')){prods=prods.filter(x=>x.id!==id);saveP();tab('prods');toast('Deleted')}}

function renderVids(c){
 c.innerHTML=`<div class="h-bar"><h2>YouTube Manager</h2></div><div class="card">${vids.map(v=>`<div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)"><div style="display:flex;gap:12px;margin-bottom:10px"><img src="https://img.youtube.com/vi/${v.id}/0.jpg" style="width:120px;border-radius:8px"><div><input value="${v.title}" onchange="vids.find(x=>x.slot===${v.slot}).title=this.value;saveV()"><input value="${v.id}" placeholder="Video ID" onchange="vids.find(x=>x.slot===${v.slot}).id=this.value;saveV()"></div></div><button class="del-btn" onclick="vids.find(x=>x.slot===${v.slot}).id='';vids.find(x=>x.slot===${v.slot}).title='Empty';saveV();tab('vids')">Clear Slot ${v.slot}</button></div>`).join('')}</div>`;
}

function renderOrders(c){
 c.innerHTML=`<div class="h-bar"><h2>Orders</h2></div><div class="card"><table><thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody>${orders.map(o=>`<tr><td>${o.id}</td><td>${o.cust}</td><td>₦${o.total.toLocaleString()}</td><td><select onchange="orders.find(x=>x.id==='${o.id}').status=this.value;saveO()"><option ${o.status==='Processing'?'selected':''}>Processing</option><option ${o.status==='Shipped'?'selected':''}>Shipped</option><option ${o.status==='Delivered'?'selected':''}>Delivered</option></select></td></tr>`).join('')}</tbody></table></div>`;
}

document.getElementById('mForm').onclick=e=>e.target.id==='mForm'?document.getElementById('mForm').classList.remove('open'):null;
</script>
</body>
</html>
